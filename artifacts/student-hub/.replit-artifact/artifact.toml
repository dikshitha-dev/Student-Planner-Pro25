kind = "mobile"
previewPath = "/"
title = "Student Productivity Hub"
version = "1.0.0"
id = "artifacts/student-hub"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22751

[services.development]
run = "pnpm --filter @workspace/student-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-hub", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/student-hub", "run", "serve" ]

[services.env]
PORT = "22751"
BASE_PATH = "/"
